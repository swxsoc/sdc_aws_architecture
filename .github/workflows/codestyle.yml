# Terraform linting and formatting
name: Terraform Linting and Formatting

on:
  pull_request:
    branches:
      - main
jobs:
  build:

    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v3
    - uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: latest
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Terraform fmt
      run: terraform fmt -check -recursive
    - name: TFLint (base)
      working-directory: base-infrastructure-terraform
      run: |
        tflint --init
        tflint
    - name: TFLint (pipeline)
      working-directory: pipeline-infrastructure-terraform
      run: |
        tflint --init
        tflint
    - name: Install Python lint tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install black flake8
    - name: Black
      run: |
        black --check --diff docs
    - name: Flake8
      run: |
        flake8 --count --max-line-length 88 docs
